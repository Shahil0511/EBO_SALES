# One-command stack: the API behind Nginx. The Unicorn warehouse is EXTERNAL
# (DB_HOST=10.150.0.5 from .env), so there is deliberately NO postgres service here.
name: libas-sales-intelligence

services:
  api:
    build: .
    image: libas-sales-api:latest
    # Injects DB_* / ENV / LOG_LEVEL at runtime (the file stays on the host, not the image).
    env_file: .env
    environment:
      ENV: production            # → JSON logs
    expose:
      - "8000"                   # internal only; Nginx is the public edge
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8080:80"                # browse the API at http://localhost:8080/api/v1/...
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
