# Reverse proxy: the public edge in front of the uvicorn workers.
# This is also where the trust boundary with the Data Nexus gateway lives.

upstream api_upstream {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Compress JSON + CSV responses on the wire (the API itself stays uncompressed).
    gzip on;
    gzip_types application/json text/csv;
    gzip_min_length 1024;

    location / {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Nginx mints a request id and forwards it; the app's middleware reuses it,
        # so a single id correlates Nginx logs ↔ app logs ↔ the response header.
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;   # generous for large CSV exports
    }
}
